# dnsmasq config — proxyDHCP + TFTP for PXE netbooting
# Coexists with an existing DHCP server (e.g. home router).

# Don't act as a DNS server.
port=0

# Bind to a single LAN interface. Change to match your setup.
interface=enp42s0
bind-interfaces

# proxyDHCP mode: don't assign IPs (your router does that),
# only respond with PXE boot options. Subnet must match your LAN.
dhcp-range=192.168.0.0,proxy

# TFTP server, root directory (relative to where start.sh is run).
enable-tftp
tftp-root=tftp

# PXE boot service entries. Use pxe-service (not dhcp-boot) for proxyDHCP.
pxe-service=x86PC,"Network Boot via netboot.xyz",netboot.xyz-undionly.kpxe
pxe-service=X86-64_EFI,"Network Boot via netboot.xyz",netboot.xyz.efi

# Verbose logging.
log-dhcp
log-queries=extra

# Run in foreground; Ctrl-C exits cleanly.
keep-in-foreground
log-facility=-
